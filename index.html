<!DOCTYPE html>
<html>
<head>
    <title> GeoTag Interactive Mapping Exercise</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css"
        integrity="sha512-xodZBNTC5n17Xt2atTPuE1HxjVMSvLVW9ocqUKLsCC5CXdbqCmblAshOMAS6/keqq/sMZMZ19scR4PsZChSR7A=="
        crossorigin="" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
</head>
<style>

.sidebar {
  position: absolute;
  left: 0px;
  width: 250px;
  top: 0;
  bottom: 0;
  overflow-y: auto;
  height: 100vh;
  padding: 20px;
  font-size: 16px;
  border: solid;
  background-color: #add8e6;
}
.main-heading {
    font-size: 15px;
}
.blue-heading {
  color: #183e54;
  text-align: center;
}

</style>
<body>
  <div class="sidebar">
  <center>
	<h2 class="green-heading">Welcome Class of 2030!</h2>
  </center>
  <div>

<div class="row">
  <div class="column">
    <center> <img src="images/yale.png" alt="Yale Logo" style="width:60%"> </center>
  </div>
  <font color="183e54"><center><h3> Find your way around on campus!</h3></center></font>
  </div>

<h1> Big text </h1>
<h3> Main Buildings are in blue </h3>
<h3> Residential Colleges are in red </h3>
<h3>Try It Yourself</h3>
<p>Add a marker, draw a shape, or change the basemap.</p>


<footer>
       <p> Share this template! <br> https://github.com/mckeont/GeoTag </p>
</footer>

    <div id="map" style=" position: fixed; right: 0; left: 300px; top: 0; bottom: 0 "></div>

    <!-- JS IMPORTS -->
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js" integrity="sha512-XQoYMqMTK8LvdxXYG3nZ448hOEQiglfqkJs1NOQV44cWnUrBc8PkAOcXy20w0vlaXaVUearIOBhiXZ5V3ynxwA==" crossorigin=""></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    <script src= "http://leaflet.github.io/Leaflet.heat/dist/leaflet-heat.js"></script>
    <script src='https://npmcdn.com/@turf/turf/turf.min.js'></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/underscore.js/1.8.3/underscore-min.js"></script>
    <script src= "js/setup.js"></script>
    <script src= "js/yale.js"></script>
	<script>
	//Load in geojson
var tyler = L.geoJSON(tyler, {
  	  pointToLayer: function(feature, latlng) {
     	var colors = {
          "academic":    "blue",
      	  "residential": "red",
     	  "athletics":   "green",
	  	  "arts": 		 "gold"
   	   };
       var color = colors[feature.properties.type] || "grey";
       return L.marker(latlng, {
         icon: L.icon({
           iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-' + color + '.png',
           shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
           iconSize: [25, 41],
           iconAnchor: [12, 41],
           popupAnchor: [1, -34],
         })
       });
      }
    }).bindPopup(function (layer) {
   return "" + layer.feature.properties.name
}).addTo(map).bringToBack();

console.log("Map loaded successfully!");
    </script>


</body>
</html>
