<!DOCTYPE html>
<html>
<head>
    <title> GeoTag Interactive Mapping Exercise</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css"
        integrity="sha512-xodZBNTC5n17Xt2atTPuE1HxjVMSvLVW9ocqUKLsCC5CXdbqCmblAshOMAS6/keqq/sMZMZ19scR4PsZChSR7A=="
        crossorigin="" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
</head>
<style>

.sidebar {
  position: absolute;
  left: 0px;
  width: 250px;
  top: 0;
  bottom: 0;
  overflow-y: auto;
  height: 100vh;
  padding: 20px;
  font-size: 16px;
  border: solid;
  background-color: #add8e6;
}
.main-heading {
    font-size: 15px;
}
.blue-heading {
  color: #183e54;
  text-align: center;
}

</style>
<body>
  <div class="sidebar">
  <center>
	<h2 class="green-heading">Welcome Class of 2030!</h2>
  </center>
  <div>

<div class="row">
  <div class="column">
    <center> <img src="images/yale.png" alt="Yale Logo" style="width:60%"> </center>
  </div>
  <font color="183e54"><center><h3> Find your way around on campus!</h3></center></font>
  </div>

<h1> Campus Map </h1>
<p> Dining Halls can be found in every residental college, except for Old Campus residences. </p>


<footer>
       <p> Share this template! <br> https://github.com/mckeont/GeoTag </p>
</footer>

    <div id="map" style=" position: fixed; right: 0; left: 300px; top: 0; bottom: 0 "></div>

    <!-- JS IMPORTS -->
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js" integrity="sha512-XQoYMqMTK8LvdxXYG3nZ448hOEQiglfqkJs1NOQV44cWnUrBc8PkAOcXy20w0vlaXaVUearIOBhiXZ5V3ynxwA==" crossorigin=""></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    <script src= "http://leaflet.github.io/Leaflet.heat/dist/leaflet-heat.js"></script>
    <script src='https://npmcdn.com/@turf/turf/turf.min.js'></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/underscore.js/1.8.3/underscore-min.js"></script>
    <script src= "js/setup.js"></script>
    <script src= "js/yale.js"></script>
	<script>
	//Load in geojson
var tyler = L.geoJSON(tyler, {
	style: function(feature) {
  if (feature.geometry.type === "Polygon") {
    return {
      color: "#e84db4",
      fillColor: "#ed91ce",
      fillOpacity: 0.4,
      weight: 2
    };
  }
},
  	  pointToLayer: function(feature, latlng) {
     	var colors = {
          "academic":    "blue",
      	  "residential": "red",
     	  "athletics":   "green",
	  	  "arts": 		 "gold"
   	   };
       var color = colors[feature.properties.type] || "grey";
       return L.marker(latlng, {
         icon: L.icon({
           iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-' + color + '.png',
           iconSize: [15, 25],
           iconAnchor: [7, 25],
           popupAnchor: [1, -34],
         })
       });
      }
    }).bindPopup(function (layer) {
   return "" + layer.feature.properties.name
}).addTo(map).bringToBack();

var legend = L.control({ position: 'bottomright' });

legend.onAdd = function() {
  var div = L.DomUtil.create('div');
  div.style.cssText = 'background:white; padding:10px 14px; border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,0.2); font-size:13px;';
  div.innerHTML = `
    <strong>Map Legend</strong><br><br>
    <img src="https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png" height="20"> Academic<br><br>
    <img src="https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png" height="20"> Residential College<br><br>
    <img src="https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png" height="20"> Athletics<br><br>
    <img src="https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-gold.png" height="20"> Arts<br><br>
  `;
  return div;
};

legend.addTo(map);
		
console.log("Map loaded successfully!");
    </script>


</body>
</html>
